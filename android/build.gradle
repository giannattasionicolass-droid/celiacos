// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

def externalBuildRoot = new File(System.getenv('LOCALAPPDATA') ?: System.getProperty('java.io.tmpdir'), 'celiashop-gradle-build')

rootProject.layout.buildDirectory.set(new File(externalBuildRoot, 'root'))

allprojects {
    layout.buildDirectory.set(new File(externalBuildRoot, project.name))
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
