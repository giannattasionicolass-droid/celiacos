<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CeliaShop</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const isGithubPages = window.location.hostname.endsWith('github.io');
      if (isGithubPages) {
        window.location.replace('/celiacos/dist/');
      }
    </script>
    <script type="module">
      if (!window.location.hostname.endsWith('github.io')) {
        import('/src/main.jsx');
      }
    </script>
  </body>
</html>
